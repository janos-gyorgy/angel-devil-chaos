{{- if .Values.playfield.enabled }}
{{- range $t := .Values.tenants }}
---
# ── {{ $t.namespace }}: ServiceAccount ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mini-api
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
---
# ── {{ $t.namespace }}: resource fence ────────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ $.Values.tenantLimits.default.cpu }}
        memory: {{ $.Values.tenantLimits.default.memory }}
      defaultRequest:
        cpu: {{ $.Values.tenantLimits.defaultRequest.cpu }}
        memory: {{ $.Values.tenantLimits.defaultRequest.memory }}
      max:
        cpu: {{ $.Values.tenantLimits.max.cpu | quote }}
        memory: {{ $.Values.tenantLimits.max.memory }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  hard:
    pods: {{ $.Values.tenantQuota.pods | quote }}
    requests.cpu: {{ $.Values.tenantQuota.requestsCpu | quote }}
    requests.memory: {{ $.Values.tenantQuota.requestsMemory }}
    limits.cpu: {{ $.Values.tenantQuota.limitsCpu | quote }}
    limits.memory: {{ $.Values.tenantQuota.limitsMemory }}
---
# ── {{ $t.namespace }}: Vault tenant-scoped secret store ──────────────────────
# Authenticates as the mini-api SA via Vault role {{ $t.vaultRole }} → can only
# read {{ $t.vaultPath }}. Prerequisite (manual, once per tenant):
#   vault kv put {{ $t.vaultPath }} api-key=$(openssl rand -hex 32)
#   vault policy write {{ $t.vaultRole }} ...
#   vault write auth/kubernetes/role/{{ $t.vaultRole }} \
#     bound_service_account_names=mini-api \
#     bound_service_account_namespaces={{ $t.namespace }} \
#     policies={{ $t.vaultRole }} ttl=1h
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-tenant
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ $t.vaultRole }}
          serviceAccountRef:
            name: mini-api
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mini-api-secrets
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore
  target:
    name: mini-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: API_KEY
      remoteRef:
        key: {{ $t.vaultPath | trimPrefix "secret/" }}
        property: api-key
        conversionStrategy: Default      # ESO defaulting webhook adds these;
        decodingStrategy: None           # declare them so Argo doesn't see drift
        metadataPolicy: None
---
# ── {{ $t.namespace }}: mini-db (Postgres) ────────────────────────────────────
# Trust auth — this is a playfield, NetworkPolicy + namespace boundary is the
# real isolation, and the only data here is seed rows the Devil exists to wipe.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mini-db-data
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-db
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mini-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mini-db
{{ include "devilangel.labels" $ | indent 8 }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ $.Values.images.miniDb }}
          env:
            - name: POSTGRES_DB
              value: playfield
            - name: POSTGRES_USER
              value: demo
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "demo", "-d", "playfield"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mini-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: mini-db
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  selector:
    app.kubernetes.io/name: mini-db
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
# ── {{ $t.namespace }}: mini-api (FastAPI) ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-api
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mini-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mini-api
{{ include "devilangel.labels" $ | indent 8 }}
    spec:
      serviceAccountName: mini-api
      containers:
        - name: mini-api
          image: {{ $.Values.images.miniApi }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TENANT
              value: {{ $t.name }}
            - name: DATABASE_URL
              value: postgresql://demo@mini-db.{{ $t.namespace }}.svc.cluster.local:5432/playfield
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: mini-api-secrets
                  key: API_KEY
            - name: BACKUP_AVAILABLE
              value: {{ $t.backupAvailable | default $.Values.backupAvailable | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mini-api
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  selector:
    app.kubernetes.io/name: mini-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# ── {{ $t.namespace }}: IngressRoute (public + local, no oauth — this is a demo)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mini-api
  namespace: {{ $t.namespace }}
  labels:
{{ include "devilangel.labels" $ | indent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $t.host }}`)
      kind: Rule
      services:
        - name: mini-api
          port: 80
{{- end }}
{{- end }}
